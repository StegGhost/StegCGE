name: CGE Validation

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  validate-cge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: python -m pytest -q

      - name: Run demo
        run: python run_demo.py

      - name: Run MCL demo
        run: python demo/mcl_demo.py
